<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Chá do Rodolfo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin: 20px 0; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #2c3e50; color: white; font-size: 0.8rem; }
        .unread { background: #fff9f0; border-left: 4px solid #e67e22; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Painel de Presenças</h1>
        <button onclick="markAllRead()" style="padding:10px; background:#e67e22; color:white; border:none; border-radius:5px; cursor:pointer">Marcar Novos como Vistos</button>
        
        <div class="stats">
            <div class="stat-card"><h3>Total Pessoas</h3><p id="t-total" style="font-size:1.5rem; font-weight:700">0</p></div>
            <div class="stat-card"><h3>RN</h3><p id="t-rn">0/10</p></div>
            <div class="stat-card"><h3>P</h3><p id="t-p">0/10</p></div>
            <div class="stat-card"><h3>M</h3><p id="t-m">0</p></div>
            <div class="stat-card"><h3>G</h3><p id="t-g">0</p></div>
        </div>

        <table>
            <thead><tr><th>Convidado</th><th>Fralda</th><th>Data</th></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDnAnSO2DNsPFT6oRYnB9zX7J2d9nOMfTg",
            authDomain: "cha-fralda-96fa8.firebaseapp.com",
            projectId: "cha-fralda-96fa8",
            storageBucket: "cha-fralda-96fa8.firebasestorage.app",
            messagingSenderId: "79075443713",
            appId: "1:79075443713:web:e6159ffa296f9adf3aec00",
            measurementId: "G-3NJ6FY6VM2"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        db.collection("convidados").orderBy("date", "desc").onSnapshot(snapshot => {
            let html = "";
            let c = { RN: 0, P: 0, M: 0, G: 0, total: 0 };
            
            snapshot.forEach(doc => {
                const d = doc.data();
                c[d.size]++;
                c.total += 1 + (d.companion ? d.companion.split(',').length : 0);
                
                html += `<tr class="${d.viewed ? '' : 'unread'}">
                    <td><strong>${d.name}</strong><br><small>${d.companion || 'Sem acompanhantes'}</small></td>
                    <td>${d.brand} - ${d.size}</td>
                    <td>${new Date(d.date).toLocaleString()}</td>
                </tr>`;
            });

            document.getElementById('table-body').innerHTML = html;
            document.getElementById('t-total').innerText = c.total;
            document.getElementById('t-rn').innerText = `${c.RN}/10`;
            document.getElementById('t-p').innerText = `${c.P}/10`;
            document.getElementById('t-m').innerText = c.M;
            document.getElementById('t-g').innerText = c.G;
        });

        async function markAllRead() {
            const batch = db.batch();
            const unread = await db.collection("convidados").where("viewed", "==", false).get();
            unread.forEach(doc => batch.update(doc.ref, { viewed: true }));
            await batch.commit();
        }
    </script>
</body>
</html>
